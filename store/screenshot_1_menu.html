<!DOCTYPE html>
<!--
  TILT Screenshot 1 — Main Menu
  Open in Chrome → DevTools → Device: 390×844 → Capture screenshot
  Or: Set viewport 390×844, zoom 100%, cmd+shift+P > "Capture full size screenshot"
-->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=390, initial-scale=1"/>
<title>TILT — Main Menu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  body {
    width: 390px;
    height: 844px;
    overflow: hidden;
    background: #0B1622;
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    width: 100%;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 0;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
  }

  /* Circuit lines background */
  .bg-svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.25;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  /* TILT title */
  .title-row {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
  }
  .title-char {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1;
  }
  .subtitle-big {
    font-size: 11px;
    font-weight: 600;
    color: #3A7AB5;
    letter-spacing: 5px;
    margin-bottom: 20px;
  }
  .desc {
    color: #5A8AB5;
    font-size: 14px;
    font-weight: 400;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 16px;
    max-width: 280px;
  }
  .coord-hint {
    font-size: 11px;
    font-weight: 500;
    color: #2A5A8A;
    letter-spacing: 1.5px;
    margin-bottom: 24px;
  }
  .best-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }
  .best-label {
    font-size: 10px;
    font-weight: 600;
    color: #3A7AB5;
    letter-spacing: 2px;
  }
  .best-value {
    font-size: 32px;
    font-weight: 700;
    color: #FFD700;
  }
  .hint-box {
    border: 1px solid #1A3A5C;
    border-radius: 4px;
    padding: 8px 16px;
    margin-bottom: 28px;
  }
  .hint-text {
    color: #3A7AB5;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
  }
  .btn {
    background: #00FFB3;
    border-radius: 6px;
    padding: 16px 48px;
    box-shadow: 0 0 24px rgba(0,255,179,0.4);
    margin-bottom: 12px;
    cursor: pointer;
    border: none;
  }
  .btn-text {
    color: #0B1622;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
  }
  .btn-secondary {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid #1A3A5C;
    border-radius: 6px;
    padding: 12px 32px;
    margin-bottom: 12px;
    background: none;
    cursor: pointer;
  }
  .btn-secondary-text {
    color: #3A7AB5;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .tts-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    border: 1px solid #1A3A5C;
    border-radius: 8px;
    padding: 10px 16px;
    width: 100%;
    max-width: 260px;
  }
  .tts-label {
    flex: 1;
    color: #5A8AB5;
    font-size: 13px;
    font-weight: 500;
  }
  .switch {
    width: 44px;
    height: 24px;
    background: rgba(0,255,179,0.3);
    border-radius: 12px;
    position: relative;
  }
  .switch-thumb {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 20px;
    height: 20px;
    background: #00FFB3;
    border-radius: 50%;
  }

  /* Icons (inline SVG) */
  .icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<!-- Background circuit lines -->
<svg class="bg-svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <line x1="0"   y1="200" x2="390" y2="200" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="0"   y1="400" x2="390" y2="400" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="0"   y1="600" x2="390" y2="600" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="100" y1="0"   x2="100" y2="844" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="200" y1="0"   x2="200" y2="844" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="300" y1="0"   x2="300" y2="844" stroke="#1A3A5C" stroke-width="1"/>
  <circle cx="100" cy="200" r="3" fill="#1A3A5C"/>
  <circle cx="200" cy="200" r="3" fill="#1A3A5C"/>
  <circle cx="300" cy="200" r="3" fill="#1A3A5C"/>
  <circle cx="100" cy="400" r="3" fill="#1A3A5C"/>
  <circle cx="200" cy="400" r="3" fill="#1A3A5C"/>
  <circle cx="300" cy="400" r="3" fill="#1A3A5C"/>
  <circle cx="100" cy="600" r="3" fill="#1A3A5C"/>
  <circle cx="200" cy="600" r="3" fill="#1A3A5C"/>
  <circle cx="300" cy="600" r="3" fill="#1A3A5C"/>
</svg>

<!-- Status bar -->
<div class="status-bar">
  <span>9:41</span>
  <svg width="60" height="14" viewBox="0 0 60 14">
    <rect x="0"  y="4" width="6"  height="10" rx="1" fill="#fff" opacity="0.4"/>
    <rect x="9"  y="2" width="6"  height="12" rx="1" fill="#fff" opacity="0.6"/>
    <rect x="18" y="0" width="6"  height="14" rx="1" fill="#fff" opacity="0.8"/>
    <rect x="27" y="0" width="6"  height="14" rx="1" fill="#fff"/>
    <rect x="40" y="3" width="18" height="8"  rx="2" fill="none" stroke="#fff" stroke-width="1.2"/>
    <rect x="58" y="5" width="2"  height="4"  rx="1" fill="#fff"/>
    <rect x="41.5" y="4.5" width="12" height="5" rx="1" fill="#fff"/>
  </svg>
</div>

<!-- Main content overlay -->
<div class="overlay">
  <div class="title-row">
    <span class="title-char" style="color:#FF6B35">T</span>
    <span class="title-char" style="color:#FFD700">I</span>
    <span class="title-char" style="color:#00C4FF">L</span>
    <span class="title-char" style="color:#00FFB3">T</span>
  </div>
  <div class="subtitle-big">THE MAZE PUZZLE</div>
  <div class="desc">Reach the glowing cell before time runs out</div>
  <div class="coord-hint">Grid: A1–C3 &nbsp;·&nbsp; Audio guided</div>

  <div class="best-box">
    <div class="best-label">BEST</div>
    <div class="best-value">12</div>
  </div>

  <div class="hint-box">
    <div class="hint-text">Tilt your device to move</div>
  </div>

  <button class="btn">
    <span class="btn-text">START GAME</span>
  </button>

  <button class="btn-secondary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3A7AB5" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span class="btn-secondary-text">LEADERBOARD</span>
  </button>

  <div class="tts-row">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00FFB3" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <span class="tts-label">Audio Guidance</span>
    <div class="switch"><div class="switch-thumb"></div></div>
  </div>
</div>

<!-- Home indicator -->
<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:120px;height:5px;background:#fff;opacity:0.25;border-radius:3px;"></div>

</body>
</html>
