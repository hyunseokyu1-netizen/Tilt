<?xml version="1.0" encoding="UTF-8"?>
<!-- TILT App Icon — 512×512 — Google Play Store -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#102236"/>
      <stop offset="100%" stop-color="#0B1622"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Circuit trace decorations -->
  <line x1="0"   y1="145" x2="116" y2="145" stroke="#0F2540" stroke-width="1.5"/>
  <line x1="396" y1="145" x2="512" y2="145" stroke="#0F2540" stroke-width="1.5"/>
  <line x1="0"   y1="240" x2="116" y2="240" stroke="#0F2540" stroke-width="1.5"/>
  <line x1="396" y1="240" x2="512" y2="240" stroke="#0F2540" stroke-width="1.5"/>
  <line x1="256" y1="0"   x2="256" y2="50"  stroke="#0F2540" stroke-width="1.5"/>
  <line x1="256" y1="340" x2="256" y2="375" stroke="#0F2540" stroke-width="1.5"/>
  <line x1="116" y1="0"   x2="116" y2="50"  stroke="#0F2540" stroke-width="1.5"/>
  <line x1="396" y1="0"   x2="396" y2="50"  stroke="#0F2540" stroke-width="1.5"/>
  <!-- Corner dots -->
  <circle cx="116" cy="145" r="3" fill="#1A3A5C"/>
  <circle cx="396" cy="145" r="3" fill="#1A3A5C"/>
  <circle cx="116" cy="240" r="3" fill="#1A3A5C"/>
  <circle cx="396" cy="240" r="3" fill="#1A3A5C"/>

  <!-- ═══════════════════════════════════════
       3 × 3 GRID
       Cell = 90px, Gap = 5px, Total = 280px
       Start: x=116, y=50
       Cols: 116 | 211 | 306
       Rows:  50 | 145 | 240
  ═══════════════════════════════════════ -->

  <!-- Row 0 — A1, B1, C1 -->
  <rect x="116" y="50"  width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>
  <rect x="211" y="50"  width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>
  <!-- C1 = TARGET -->
  <rect x="306" y="50"  width="90" height="90" fill="rgba(0,255,136,0.06)" stroke="#00FF88" stroke-width="2" rx="6"/>

  <!-- Row 1 — A2, B2 (player), C2 -->
  <rect x="116" y="145" width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>
  <!-- B2 = PLAYER (subtle highlight) -->
  <rect x="211" y="145" width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>
  <rect x="306" y="145" width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>

  <!-- Row 2 — A3, B3, C3 -->
  <rect x="116" y="240" width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>
  <rect x="211" y="240" width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>
  <rect x="306" y="240" width="90" height="90" fill="#0A1929" stroke="#1A3A5C" stroke-width="1.5" rx="6"/>

  <!-- ═══ TARGET C1 corner brackets (x=306, y=50, w=90, h=90) ═══ -->
  <!-- TL -->
  <rect x="305" y="49"  width="20" height="3" fill="#00FF88" filter="url(#glow)"/>
  <rect x="305" y="49"  width="3"  height="20" fill="#00FF88" filter="url(#glow)"/>
  <!-- TR -->
  <rect x="377" y="49"  width="20" height="3" fill="#00FF88" filter="url(#glow)"/>
  <rect x="394" y="49"  width="3"  height="20" fill="#00FF88" filter="url(#glow)"/>
  <!-- BL -->
  <rect x="305" y="138" width="20" height="3" fill="#00FF88" filter="url(#glow)"/>
  <rect x="305" y="119" width="3"  height="20" fill="#00FF88" filter="url(#glow)"/>
  <!-- BR -->
  <rect x="377" y="138" width="20" height="3" fill="#00FF88" filter="url(#glow)"/>
  <rect x="394" y="119" width="3"  height="20" fill="#00FF88" filter="url(#glow)"/>

  <!-- ═══ COORDINATE LABELS ═══ -->
  <text x="121" y="63"  font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">A1</text>
  <text x="216" y="63"  font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">B1</text>
  <text x="311" y="63"  font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(0,255,136,0.7)">C1</text>
  <text x="121" y="158" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">A2</text>
  <text x="216" y="158" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(0,255,136,0.7)">B2</text>
  <text x="311" y="158" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">C2</text>
  <text x="121" y="253" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">A3</text>
  <text x="216" y="253" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">B3</text>
  <text x="311" y="253" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(58,122,181,0.45)">C3</text>

  <!-- ═══ PLAYER at B2 center (256, 190) ═══ -->
  <!-- Glow halo -->
  <rect x="236" y="170" width="40" height="40" rx="6" fill="#00FF88" opacity="0.12" filter="url(#glow-lg)"/>
  <!-- Player box -->
  <rect x="238" y="172" width="36" height="36" rx="5"
        fill="rgba(0,255,136,0.15)" stroke="#00FF88" stroke-width="2.5"
        filter="url(#glow)"/>
  <!-- Player core -->
  <rect x="247" y="181" width="18" height="18" rx="3" fill="#00FF88"/>

  <!-- Small chevron arrow hinting direction B2→C1 (up-right) -->
  <polyline points="269,162 275,155 281,162" fill="none" stroke="#00FF88" stroke-width="1.8" opacity="0.45" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ═══ TILT TITLE ═══ -->
  <!-- Shadow / glow layer -->
  <text x="256" y="416" font-family="'Arial Black',Impact,'Helvetica Neue',sans-serif"
        font-weight="900" font-size="80" text-anchor="middle" letter-spacing="12"
        opacity="0.6" filter="url(#glow-lg)">
    <tspan fill="#FF6B35">T</tspan><tspan fill="#FFD700">I</tspan><tspan fill="#00C4FF">L</tspan><tspan fill="#00FFB3">T</tspan>
  </text>
  <!-- Main text -->
  <text x="256" y="416" font-family="'Arial Black',Impact,'Helvetica Neue',sans-serif"
        font-weight="900" font-size="80" text-anchor="middle" letter-spacing="12">
    <tspan fill="#FF6B35">T</tspan><tspan fill="#FFD700">I</tspan><tspan fill="#00C4FF">L</tspan><tspan fill="#00FFB3">T</tspan>
  </text>

  <!-- Subtitle -->
  <text x="256" y="451" font-family="Arial,'Helvetica Neue',sans-serif"
        font-weight="600" font-size="13" fill="#3A7AB5"
        text-anchor="middle" letter-spacing="4.5">THE MAZE PUZZLE</text>
</svg>
